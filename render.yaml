services:
  # --- Backend FastAPI Service ---
  - type: web
    name: ragfolio-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Render will prompt you for this key securely in the dashboard

  # --- Frontend React Service ---
  - type: web
    name: ragfolio-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # You will need to set this to your backend URL + /api (e.g. https://ragfolio-backend.onrender.com/api)
    routes:
      # Support client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
